<!-- public/Login.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 - 학교 봇</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="reg-body">
  <div class="reg-wrap">
    <div class="reg-logo">
      <h1>학교 봇</h1>
      <p>로그인</p>
    </div>

    <div class="reg-card">
      <div class="reg-step active">
        <div class="reg-step-title">로그인</div>

        <div class="reg-phone-box">
          <label class="reg-label" for="loginUserId">회원 ID</label>
          <input id="loginUserId" type="text" class="reg-input" placeholder="회원 ID" autocomplete="username">
          <label class="reg-label" for="loginPassword">비밀번호</label>
          <div class="password-field">
            <input id="loginPassword" type="password" class="reg-input" placeholder="비밀번호" autocomplete="current-password">
            <button class="password-toggle" type="button" data-password-toggle="loginPassword" aria-controls="loginPassword" aria-pressed="false">표시</button>
          </div>
          <button class="reg-btn reg-btn-main" id="passwordLoginBtn" type="button" onclick="loginWithPassword()">ID/비밀번호로 로그인</button>
          <div class="reg-auth-divider">또는 Google / SMS 인증</div>
          <label class="reg-label">인증 방법</label>
          <button class="reg-btn reg-btn-outline reg-google-btn" id="googleLoginBtn" type="button" onclick="signInWithGoogle()" disabled>Google로 로그인</button>
          <div class="reg-auth-divider">또는 SMS 인증</div>
          <label class="reg-label" for="phoneNumber">휴대폰 번호 인증</label>
          <div class="reg-search-row">
            <input id="phoneNumber" type="tel" class="reg-input" placeholder="010-1234-5678" autocomplete="tel">
            <button class="reg-btn reg-btn-outline" id="sendPhoneBtn" type="button" onclick="sendPhoneCode()">인증 문자 받기</button>
          </div>
          <div id="recaptchaContainer" class="reg-recaptcha"></div>
          <div class="reg-search-row">
            <input id="phoneCode" type="text" class="reg-input" placeholder="인증번호 6자리" inputmode="numeric" autocomplete="one-time-code">
            <button class="reg-btn reg-btn-outline" id="confirmPhoneBtn" type="button" onclick="confirmPhoneCode()" disabled>인증 확인</button>
          </div>
          <div class="reg-phone-status" id="loginStatus">Firebase 인증으로 로그인합니다.</div>
        </div>

        <div class="login-missing-box" id="missingUserBox" hidden>
          <p>회원정보가 없습니다.</p>
          <p>회원가입 페이지로 이동할까요?</p>
          <div class="login-choice-row">
            <button class="reg-btn reg-btn-main" type="button" onclick="goRegister()">예</button>
            <button class="reg-btn reg-btn-outline" type="button" onclick="hideMissingUser()">아니오</button>
          </div>
        </div>

        <a class="login-register-link" href="/register">ID/비밀번호 회원가입</a>
        <a class="login-register-link" href="/register/auth">SMS/Google 회원가입</a>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <a href="/privacy">개인정보처리방침</a>
    <a href="/terms">이용약관</a>
    <a href="https://discord.gg/2JbvBa2ykP" target="_blank" rel="noopener noreferrer">문의</a>
  </footer>

  <script src="/login.js?v=3.2.1-handler-fix"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
</body>
</html>
